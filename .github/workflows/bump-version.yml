# .github/workflows/bump-version.yml
name: Bump Module Version

on:
  push:
    branches: [dev]
    paths-ignore:
      - '*.psd1'  # Prevent loop when the action commits the manifest

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump build version
        shell: pwsh
        run: |
          $manifest = Get-ChildItem -Recurse -Filter *.psd1 | Select-Object -First 1
          $data = Import-PowerShellDataFile $manifest.FullName
          $ver = [version]$data.ModuleVersion
          $newVer = [version]::new($ver.Major, $ver.Minor, $ver.Build, ($ver.Revision + 1))
          Update-ModuleManifest -Path $manifest.FullName -ModuleVersion $newVer
          echo "NEW_VERSION=$newVer" >> $env:GITHUB_ENV

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.psd1"
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push
          